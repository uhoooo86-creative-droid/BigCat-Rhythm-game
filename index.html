<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEAT DROP — 리듬게임</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffbe0b;
    --neon-green: #06d6a0;
    --bg-dark: #030a0f;
    --bg-panel: #060f18;
    --lane-w: 80px;
    --hit-zone: 560px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: #fff;
    font-family: 'Orbitron', monospace;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── SCANLINE OVERLAY ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.015) 2px, rgba(0,245,255,0.015) 4px);
    pointer-events: none; z-index: 999;
  }

  /* ── UPLOAD SCREEN ── */
  #upload-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg-dark);
    z-index: 100;
    gap: 32px;
  }

  .title-logo {
    font-size: clamp(36px, 8vw, 80px);
    font-weight: 900;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(0,245,255,0.5));
    animation: pulse-logo 2s ease-in-out infinite;
  }
  @keyframes pulse-logo {
    0%,100% { filter: drop-shadow(0 0 30px rgba(0,245,255,0.5)); }
    50% { filter: drop-shadow(0 0 60px rgba(255,0,110,0.7)); }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .upload-zone {
    width: min(440px, 90vw);
    height: 200px;
    border: 2px dashed rgba(0,245,255,0.3);
    border-radius: 4px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .upload-zone::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,245,255,0.03) 0%, transparent 70%);
    transition: all 0.3s;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 40px rgba(0,245,255,0.2), inset 0 0 40px rgba(0,245,255,0.05);
  }
  .upload-zone:hover::before { background: radial-gradient(ellipse at center, rgba(0,245,255,0.08) 0%, transparent 70%); }

  .upload-icon {
    font-size: 48px;
    filter: drop-shadow(0 0 10px rgba(0,245,255,0.5));
  }
  .upload-label {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.1em;
  }
  .upload-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.2em;
  }

  #file-input { display: none; }

  .difficulty-row {
    display: flex; gap: 12px;
  }
  .diff-btn {
    padding: 10px 24px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: rgba(255,255,255,0.5);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .diff-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
  .diff-btn.active { border-color: var(--neon-pink); color: var(--neon-pink); background: rgba(255,0,110,0.1); box-shadow: 0 0 20px rgba(255,0,110,0.2); }

  .start-btn {
    padding: 16px 60px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
    border: none; border-radius: 2px;
    font-family: 'Orbitron', monospace;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.2em;
    color: #000; cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0,245,255,0.4); }
  .start-btn.visible { display: block; }

  .track-info {
    display: none;
    text-align: center;
  }
  .track-info.visible { display: block; }
  .track-name {
    font-size: 18px; color: var(--neon-cyan);
    text-shadow: 0 0 20px rgba(0,245,255,0.5);
    letter-spacing: 0.1em;
  }
  .track-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: rgba(255,255,255,0.3);
    margin-top: 6px; letter-spacing: 0.2em;
  }

  /* ── GAME SCREEN ── */
  #game-screen {
    display: none;
    position: fixed; inset: 0;
    flex-direction: column;
    align-items: center;
  }
  #game-screen.active { display: flex; }

  /* HUD */
  .hud {
    width: 100%; display: flex;
    justify-content: space-between; align-items: center;
    padding: 16px 32px;
    background: linear-gradient(180deg, rgba(3,10,15,0.95), transparent);
    position: relative; z-index: 10;
  }
  .hud-block { text-align: center; }
  .hud-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }
  .hud-value {
    font-size: 28px; font-weight: 700;
    color: #fff;
    text-shadow: 0 0 20px rgba(0,245,255,0.4);
    transition: all 0.1s;
  }
  .hud-value.pop { color: var(--neon-cyan); transform: scale(1.2); text-shadow: 0 0 30px rgba(0,245,255,0.8); }

  .combo-display {
    font-size: 48px; font-weight: 900;
    background: linear-gradient(135deg, var(--neon-yellow), var(--neon-pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 15px rgba(255,190,11,0.6));
    min-width: 80px; text-align: center;
    transition: transform 0.1s;
  }
  .combo-display.pop { transform: scale(1.3); }

  /* LANES */
  .lanes-container {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  .lane {
    width: var(--lane-w);
    height: 100%;
    position: relative;
    border-left: 1px solid rgba(255,255,255,0.04);
    border-right: 1px solid rgba(255,255,255,0.04);
    overflow: hidden;
  }

  .lane-bg {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.01) 100%);
  }

  /* Lane colors */
  .lane:nth-child(1) { --lane-color: #00f5ff; }
  .lane:nth-child(2) { --lane-color: #ff006e; }
  .lane:nth-child(3) { --lane-color: #ffbe0b; }
  .lane:nth-child(4) { --lane-color: #06d6a0; }

  /* Hit zone line */
  .hit-line {
    position: absolute;
    bottom: 120px;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--lane-color), transparent);
    box-shadow: 0 0 20px var(--lane-color), 0 0 40px var(--lane-color);
    z-index: 5;
  }

  /* Key button */
  .key-btn {
    position: absolute;
    bottom: 60px;
    left: 50%; transform: translateX(-50%);
    width: 56px; height: 56px;
    border: 2px solid var(--lane-color);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: var(--lane-color);
    background: rgba(0,0,0,0.6);
    box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 0 15px rgba(0,0,0,0.3);
    transition: all 0.05s;
    z-index: 5;
    cursor: pointer;
  }
  .key-btn.pressed {
    background: var(--lane-color);
    color: #000;
    box-shadow: 0 0 30px var(--lane-color), 0 0 60px var(--lane-color);
    transform: translateX(-50%) scale(0.9);
  }
  .key-btn.flashing {
    animation: key-flash 0.1s ease-out;
  }
  @keyframes key-flash {
    0% { box-shadow: 0 0 60px var(--lane-color), 0 0 100px var(--lane-color); }
    100% { box-shadow: 0 0 15px rgba(0,0,0,0.5); }
  }

  /* Notes */
  .note {
    position: absolute;
    width: 64px;
    height: 18px;
    left: 50%; transform: translateX(-50%);
    border-radius: 3px;
    background: var(--lane-color);
    box-shadow: 0 0 15px var(--lane-color), 0 0 30px rgba(0,0,0,0.3);
    z-index: 4;
    transition: none;
    will-change: transform;
  }
  .note::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 3px;
    background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 50%);
  }

  /* Judge text */
  .judge-text {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: 180px;
    font-size: 18px; font-weight: 700;
    letter-spacing: 0.1em;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    white-space: nowrap;
  }
  .judge-text.show {
    animation: judge-pop 0.5s ease-out forwards;
  }
  .judge-perfect { color: var(--neon-cyan); text-shadow: 0 0 20px var(--neon-cyan); }
  .judge-good { color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); }
  .judge-miss { color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); }

  @keyframes judge-pop {
    0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.3); }
    30% { transform: translateX(-50%) translateY(-10px) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-30px) scale(0.8); }
  }

  /* Hit effect */
  .hit-effect {
    position: absolute;
    width: 80px; height: 80px;
    left: 50%; transform: translateX(-50%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 15;
    animation: hit-burst 0.3s ease-out forwards;
  }
  @keyframes hit-burst {
    0% { opacity: 1; transform: translateX(-50%) scale(0.3); box-shadow: 0 0 20px var(--lane-color), 0 0 40px var(--lane-color); }
    100% { opacity: 0; transform: translateX(-50%) scale(2); box-shadow: 0 0 5px var(--lane-color); }
  }

  /* Progress bar */
  .progress-bar {
    position: absolute; bottom: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    transition: width 0.3s linear;
    box-shadow: 0 0 10px rgba(0,245,255,0.5);
    z-index: 10;
  }

  /* BPM visualizer */
  .bpm-bar {
    position: absolute;
    top: 0; bottom: 0;
    width: 4px;
    background: rgba(255,255,255,0.03);
    pointer-events: none;
  }
  .bpm-bar.beat {
    animation: bpm-flash 0.15s ease-out;
  }
  @keyframes bpm-flash {
    0% { background: rgba(255,255,255,0.3); }
    100% { background: rgba(255,255,255,0.03); }
  }

  /* RESULT SCREEN */
  #result-screen {
    display: none;
    position: fixed; inset: 0;
    flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(3,10,15,0.97);
    z-index: 200;
    gap: 24px;
  }
  #result-screen.active { display: flex; }

  .result-title {
    font-size: clamp(28px, 6vw, 60px);
    font-weight: 900;
    letter-spacing: 0.2em;
  }
  .result-grade {
    font-size: clamp(80px, 15vw, 140px);
    font-weight: 900;
    line-height: 1;
    filter: drop-shadow(0 0 40px currentColor);
  }
  .grade-S { color: var(--neon-yellow); }
  .grade-A { color: var(--neon-cyan); }
  .grade-B { color: var(--neon-green); }
  .grade-C { color: var(--neon-pink); }

  .result-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 24px; text-align: center;
  }
  .stat-item .val {
    font-size: 32px; font-weight: 700;
    color: #fff; margin-bottom: 4px;
  }
  .stat-item .lbl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.3);
  }

  .result-btns { display: flex; gap: 16px; margin-top: 16px; }
  .res-btn {
    padding: 12px 36px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent; border-radius: 2px;
    font-family: 'Orbitron', monospace;
    font-size: 12px; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.7); cursor: pointer;
    transition: all 0.2s;
  }
  .res-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0,245,255,0.2); }
  .res-btn.primary { background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink)); color: #000; border: none; font-weight: 700; }
  .res-btn.primary:hover { box-shadow: 0 0 40px rgba(0,245,255,0.4); transform: scale(1.05); }

  /* Accuracy bar */
  .acc-bar-wrap { width: 300px; }
  .acc-bar-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  .acc-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-yellow)); transition: width 1s ease; }

  /* KEY LABELS */
  .keys-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.25);
    text-align: center;
    margin-top: -8px;
  }

  /* Waveform canvas */
  #waveform {
    position: absolute;
    bottom: 20px; left: 0; right: 0;
    height: 40px;
    opacity: 0.3;
    pointer-events: none;
  }

  /* Particle system */
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    pointer-events: none;
    animation: particle-fly 0.6s ease-out forwards;
  }
  @keyframes particle-fly {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* ── FIREWORKS ── */
  #fireworks-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 500;
  }

  /* ── AING POPUP ── */
  .aing-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: clamp(48px, 10vw, 100px);
    font-weight: 900;
    font-family: 'Orbitron', monospace;
    background: linear-gradient(135deg, #ff006e, #ffbe0b, #00f5ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(255,0,110,0.8));
    z-index: 600;
    pointer-events: none;
    white-space: nowrap;
    letter-spacing: 0.1em;
    animation: none;
  }
  .aing-popup.show {
    animation: aing-burst 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes aing-burst {
    0%   { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 1; }
    20%  { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); opacity: 1; }
    40%  { transform: translate(-50%, -50%) scale(1.0) rotate(-3deg); opacity: 1; }
    60%  { transform: translate(-50%, -50%) scale(1.1) rotate(0deg); opacity: 1; }
    80%  { transform: translate(-50%, -50%) scale(1.0) rotate(0deg); opacity: 0.8; }
    100% { transform: translate(-50%, -60%) scale(0.7) rotate(0deg); opacity: 0; }
  }

  /* ── MISS SCREEN SHAKE ── */
  @keyframes screen-shake {
    0%,100% { transform: translateX(0); }
    15%  { transform: translateX(-8px) rotate(-0.5deg); }
    30%  { transform: translateX(8px) rotate(0.5deg); }
    45%  { transform: translateX(-5px); }
    60%  { transform: translateX(5px); }
    75%  { transform: translateX(-2px); }
  }
  #game-screen.shake { animation: screen-shake 0.35s ease-out; }
</style>
</head>
<body>

<!-- UPLOAD SCREEN -->
<div id="upload-screen">
  <div class="title-logo">BEAT DROP</div>
  <div class="subtitle">// RHYTHM GAME ENGINE v1.0 //</div>

  <div class="upload-zone" id="upload-zone">
    <div class="upload-icon">🎵</div>
    <div class="upload-label">MP3 파일을 드래그하거나 클릭하여 업로드</div>
    <div class="upload-hint">// SUPPORTS MP3 · WAV · OGG · AAC //</div>
    <input type="file" id="file-input" accept="audio/*">
  </div>

  <div class="track-info" id="track-info">
    <div class="track-name" id="track-name">—</div>
    <div class="track-meta" id="track-meta">ANALYZING AUDIO...</div>
  </div>

  <div>
    <div class="subtitle" style="margin-bottom:12px; text-align:center;">// DIFFICULTY //</div>
    <div class="difficulty-row">
      <button class="diff-btn" data-diff="easy">EASY</button>
      <button class="diff-btn active" data-diff="normal">NORMAL</button>
      <button class="diff-btn" data-diff="hard">HARD</button>
      <button class="diff-btn" data-diff="insane">INSANE</button>
    </div>
  </div>

  <div class="keys-label">// KEYS: D · F · J · K — or tap on mobile //</div>
  <button class="start-btn" id="start-btn">▶ START</button>
</div>

<!-- FIREWORKS CANVAS (global overlay) -->
<canvas id="fireworks-canvas"></canvas>
<!-- AING POPUP -->
<div class="aing-popup" id="aing-popup">아잉~💕</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div class="hud">
    <div class="hud-block">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="score-val">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">COMBO</div>
      <div class="combo-display" id="combo-val">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">ACCURACY</div>
      <div class="hud-value" id="acc-val">100.0%</div>
    </div>
  </div>

  <div class="lanes-container" id="lanes-container">
    <!-- lanes injected by JS -->
  </div>

  <canvas id="waveform" width="800" height="40"></canvas>
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen" id="result-screen">
  <div class="result-title" id="result-title">STAGE CLEAR</div>
  <div class="result-grade" id="result-grade">S</div>
  <div class="result-stats">
    <div class="stat-item"><div class="val" id="r-score">0</div><div class="lbl">SCORE</div></div>
    <div class="stat-item"><div class="val" id="r-maxcombo">0</div><div class="lbl">MAX COMBO</div></div>
    <div class="stat-item"><div class="val" id="r-acc">0%</div><div class="lbl">ACCURACY</div></div>
    <div class="stat-item"><div class="val" id="r-perfect">0</div><div class="lbl">PERFECT</div></div>
    <div class="stat-item"><div class="val" id="r-good">0</div><div class="lbl">GOOD</div></div>
    <div class="stat-item"><div class="val" id="r-miss">0</div><div class="lbl">MISS</div></div>
  </div>
  <div class="acc-bar-wrap">
    <div class="acc-bar-track"><div class="acc-bar-fill" id="acc-bar-fill" style="width:0%"></div></div>
  </div>
  <div class="result-btns">
    <button class="res-btn" id="retry-btn">↩ RETRY</button>
    <button class="res-btn primary" id="new-song-btn">NEW SONG</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  BEAT DROP — RHYTHM GAME ENGINE
// ═══════════════════════════════════════════

const LANE_KEYS = ['d','f','j','k'];
const LANE_LABELS = ['D','F','J','K'];
const LANE_COLORS = ['#00f5ff','#ff006e','#ffbe0b','#06d6a0'];

const DIFFICULTIES = {
  easy:   { noteInterval: 900, speed: 280, hitWindow: 160, goodWindow: 280, noteDensity: 0.45 },
  normal: { noteInterval: 700, speed: 360, hitWindow: 120, goodWindow: 220, noteDensity: 0.60 },
  hard:   { noteInterval: 500, speed: 460, hitWindow: 90,  goodWindow: 160, noteDensity: 0.75 },
  insane: { noteInterval: 320, speed: 600, hitWindow: 65,  goodWindow: 120, noteDensity: 0.90 },
};

let audioCtx, audioBuffer, sourceNode, analyser, dataArray;
let audioFile = null;
let difficulty = 'normal';
let gameRunning = false;
let gameStartTime = 0;
let notes = [];
let score = 0, combo = 0, maxCombo = 0;
let countPerfect = 0, countGood = 0, countMiss = 0, totalNotes = 0;
let noteIdCounter = 0;
let animFrame;
let audioDuration = 0;
let waveCanvas, waveCtx;
let laneEls = [], keyBtnEls = [], judgeEls = [];

// ── FIREWORKS ENGINE ──
const fwCanvas = document.getElementById('fireworks-canvas');
const fwCtx = fwCanvas.getContext('2d');
let fireworkParticles = [];

function resizeFireworks() {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}
resizeFireworks();
window.addEventListener('resize', resizeFireworks);

function launchFireworks() {
  const colors = ['#ff006e','#00f5ff','#ffbe0b','#06d6a0','#ffffff','#ff9f1c','#e040fb'];
  const burstCount = 5;
  for (let b = 0; b < burstCount; b++) {
    setTimeout(() => {
      const cx = fwCanvas.width * (0.2 + Math.random() * 0.6);
      const cy = fwCanvas.height * (0.1 + Math.random() * 0.5);
      const color = colors[Math.floor(Math.random() * colors.length)];
      for (let i = 0; i < 60; i++) {
        const angle = (i / 60) * Math.PI * 2;
        const speed = 3 + Math.random() * 7;
        fireworkParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1,
          alpha: 1,
          color,
          size: 2 + Math.random() * 3,
          trail: [],
        });
      }
      // Star burst extra
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        fireworkParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          color: '#ffffff',
          size: 1 + Math.random() * 2,
          trail: [],
        });
      }
    }, b * 180);
  }
}

function updateFireworks() {
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  fireworkParticles = fireworkParticles.filter(p => p.alpha > 0.01);
  fireworkParticles.forEach(p => {
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 5) p.trail.shift();

    // Draw trail
    p.trail.forEach((t, i) => {
      fwCtx.beginPath();
      fwCtx.arc(t.x, t.y, p.size * (i / p.trail.length) * 0.5, 0, Math.PI * 2);
      fwCtx.fillStyle = p.color;
      fwCtx.globalAlpha = p.alpha * (i / p.trail.length) * 0.4;
      fwCtx.fill();
    });

    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    fwCtx.fillStyle = p.color;
    fwCtx.globalAlpha = p.alpha;
    fwCtx.shadowBlur = 8;
    fwCtx.shadowColor = p.color;
    fwCtx.fill();
    fwCtx.shadowBlur = 0;
    fwCtx.globalAlpha = 1;

    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15; // gravity
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.alpha -= 0.018;
  });
  requestAnimationFrame(updateFireworks);
}
updateFireworks();

// ── SOUND EFFECTS via Web Audio API ──
function getSfxCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playMissSound() {
  const ctx = getSfxCtx();
  // "꽥!" = noisy burst + rapid pitch drop
  const bufSize = ctx.sampleRate * 0.25;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.15));
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;

  // Distortion for crunch
  const wave = ctx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i * 2) / 256 - 1;
    curve[i] = (Math.PI + 300) * x / (Math.PI + 300 * Math.abs(x));
  }
  wave.curve = curve;

  // Pitch envelope via playback rate modulation not possible on buffer—use oscillator overlay
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(280, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.25);

  const gainOsc = ctx.createGain();
  gainOsc.gain.setValueAtTime(0.4, ctx.currentTime);
  gainOsc.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);

  const gainNoise = ctx.createGain();
  gainNoise.gain.setValueAtTime(0.35, ctx.currentTime);
  gainNoise.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);

  src.connect(wave);
  wave.connect(gainNoise);
  gainNoise.connect(ctx.destination);

  osc.connect(gainOsc);
  gainOsc.connect(ctx.destination);

  src.start();
  osc.start();
  src.stop(ctx.currentTime + 0.3);
  osc.stop(ctx.currentTime + 0.3);
}

function playGoodSound() {
  const ctx = getSfxCtx();
  // Low-pitched soft thud — slightly off, not wrong
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(220, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(160, ctx.currentTime + 0.18);

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.5, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);

  // Add slight detune wobble
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(215, ctx.currentTime);
  osc2.frequency.exponentialRampToValueAtTime(155, ctx.currentTime + 0.18);
  const gain2 = ctx.createGain();
  gain2.gain.setValueAtTime(0.2, ctx.currentTime);
  gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);

  osc.connect(gain); gain.connect(ctx.destination);
  osc2.connect(gain2); gain2.connect(ctx.destination);
  osc.start(); osc2.start();
  osc.stop(ctx.currentTime + 0.25);
  osc2.stop(ctx.currentTime + 0.25);
}

function playPerfectSound() {
  const ctx = getSfxCtx();
  // Crisp high tick
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.06);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
}

function playAingSound() {
  const ctx = getSfxCtx();
  // 아잉~ = cute rising-falling glide with vibrato
  const notes_hz = [523.25, 659.25, 783.99, 659.25, 523.25]; // C5→E5→G5→E5→C5
  const dur = 0.12;
  notes_hz.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    osc.type = 'sine';
    osc2.type = 'sine';
    osc.frequency.value = freq;
    osc2.frequency.value = freq * 2; // octave up for brightness

    // vibrato
    const vibrato = ctx.createOscillator();
    vibrato.frequency.value = 6;
    const vibGain = ctx.createGain();
    vibGain.gain.value = 8;
    vibrato.connect(vibGain);
    vibGain.connect(osc.frequency);

    const gain = ctx.createGain();
    const t = ctx.currentTime + i * dur;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.05);

    const gain2 = ctx.createGain();
    gain2.gain.setValueAtTime(0, t);
    gain2.gain.linearRampToValueAtTime(0.12, t + 0.03);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.05);

    osc.connect(gain); gain.connect(ctx.destination);
    osc2.connect(gain2); gain2.connect(ctx.destination);
    vibrato.start(t); osc.start(t); osc2.start(t);
    vibrato.stop(t + dur + 0.1);
    osc.stop(t + dur + 0.1);
    osc2.stop(t + dur + 0.1);
  });

  // Final long glide 아~잉↗
  const glide = ctx.createOscillator();
  glide.type = 'sine';
  const glideT = ctx.currentTime + notes_hz.length * dur;
  glide.frequency.setValueAtTime(440, glideT);
  glide.frequency.exponentialRampToValueAtTime(660, glideT + 0.3);
  glide.frequency.exponentialRampToValueAtTime(550, glideT + 0.55);
  const glideGain = ctx.createGain();
  glideGain.gain.setValueAtTime(0.4, glideT);
  glideGain.gain.exponentialRampToValueAtTime(0.001, glideT + 0.6);
  glide.connect(glideGain); glideGain.connect(ctx.destination);
  glide.start(glideT); glide.stop(glideT + 0.65);
}

// ── AING POPUP ──
function showAingPopup() {
  const el = document.getElementById('aing-popup');
  el.className = 'aing-popup';
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1300);
}

// ── SCREEN SHAKE ──
function shakeScreen() {
  const gs = document.getElementById('game-screen');
  gs.classList.remove('shake');
  void gs.offsetWidth;
  gs.classList.add('shake');
  setTimeout(() => gs.classList.remove('shake'), 350);
}

// ── INIT DOM ──
function buildLanes() {
  const container = document.getElementById('lanes-container');
  container.innerHTML = '';
  laneEls = []; keyBtnEls = []; judgeEls = [];
  for (let i = 0; i < 4; i++) {
    const lane = document.createElement('div');
    lane.className = 'lane';
    lane.style.setProperty('--lane-color', LANE_COLORS[i]);
    lane.innerHTML = `
      <div class="lane-bg"></div>
      <div class="bpm-bar" id="bpm-bar-${i}"></div>
      <div class="hit-line"></div>
      <div class="key-btn" id="key-btn-${i}">${LANE_LABELS[i]}</div>
      <div class="judge-text" id="judge-${i}"></div>
    `;
    container.appendChild(lane);
    lane.addEventListener('pointerdown', (e) => { e.preventDefault(); pressLane(i); });
    lane.addEventListener('pointerup', () => releaseLane(i));
    laneEls.push(lane);
    keyBtnEls.push(lane.querySelector(`#key-btn-${i}`));
    judgeEls.push(lane.querySelector(`#judge-${i}`));
  }
  waveCanvas = document.getElementById('waveform');
  waveCtx = waveCanvas.getContext('2d');
}
buildLanes();

// ── UPLOAD ──
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('audio/')) handleFile(f);
});

async function handleFile(file) {
  audioFile = file;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const trackName = document.getElementById('track-name');
  const trackMeta = document.getElementById('track-meta');
  const trackInfo = document.getElementById('track-info');
  trackName.textContent = file.name.replace(/\.[^/.]+$/, '');
  trackMeta.textContent = 'ANALYZING AUDIO...';
  trackInfo.classList.add('visible');
  const arrayBuffer = await file.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  audioDuration = audioBuffer.duration;
  const mins = Math.floor(audioDuration / 60);
  const secs = Math.floor(audioDuration % 60).toString().padStart(2,'0');
  trackMeta.textContent = `DURATION: ${mins}:${secs}  ·  SAMPLE RATE: ${audioBuffer.sampleRate}Hz`;
  document.getElementById('start-btn').classList.add('visible');
}

// ── DIFFICULTY SELECT ──
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
  });
});

// ── START ──
document.getElementById('start-btn').addEventListener('click', startGame);

function startGame() {
  if (!audioBuffer) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  score = 0; combo = 0; maxCombo = 0;
  countPerfect = 0; countGood = 0; countMiss = 0;
  notes = []; totalNotes = 0; noteIdCounter = 0;
  updateHUD();
  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('game-screen').classList.add('active');
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  if (sourceNode) { try { sourceNode.stop(); } catch(e){} }
  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  sourceNode.start(0);
  gameStartTime = audioCtx.currentTime;
  gameRunning = true;
  sourceNode.onended = () => { if (gameRunning) endGame(); };
  scheduleNotes();
  gameLoop();
}

// ── NOTE SCHEDULING ──
function scheduleNotes() {
  const cfg = DIFFICULTIES[difficulty];
  const totalBeats = Math.floor(audioDuration * 1000 / cfg.noteInterval);
  for (let i = 0; i < totalBeats; i++) {
    if (Math.random() > cfg.noteDensity) continue;
    const lane = Math.floor(Math.random() * 4);
    const spawnTime = (i * cfg.noteInterval / 1000) - (laneHeight() / cfg.speed);
    if (spawnTime < 0) continue;
    notes.push({ id: noteIdCounter++, lane, spawnTime, hit: false, el: null });
    totalNotes++;
  }
}

function laneHeight() {
  return laneEls[0] ? laneEls[0].offsetHeight : 600;
}

// ── GAME LOOP ──
function gameLoop() {
  if (!gameRunning) return;
  animFrame = requestAnimationFrame(gameLoop);
  const now = audioCtx.currentTime - gameStartTime;
  const cfg = DIFFICULTIES[difficulty];
  const H = laneHeight();
  const hitZoneBottom = 120 + 9;

  notes.forEach(note => {
    if (!note.el && !note.hit && now >= note.spawnTime) {
      const el = document.createElement('div');
      el.className = 'note';
      el.style.bottom = H + 'px';
      el.style.setProperty('--lane-color', LANE_COLORS[note.lane]);
      laneEls[note.lane].appendChild(el);
      note.el = el;
    }
  });

  notes.forEach(note => {
    if (!note.el || note.hit) return;
    const elapsed = now - note.spawnTime;
    const fromTop = elapsed * cfg.speed;
    const bottomPos = H - fromTop;
    note.el.style.bottom = bottomPos + 'px';
    if (bottomPos < -40) {
      note.hit = true;
      if (note.el.parentNode) note.el.remove();
      registerMiss(note.lane);
    }
  });

  const prog = Math.min((now / audioDuration) * 100, 100);
  document.getElementById('progress-bar').style.width = prog + '%';
  drawWaveform();
}

// ── INPUT ──
const keysDown = {};
document.addEventListener('keydown', e => {
  if (keysDown[e.key]) return;
  keysDown[e.key] = true;
  const idx = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (idx !== -1) pressLane(idx);
});
document.addEventListener('keyup', e => {
  keysDown[e.key] = false;
  const idx = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (idx !== -1) releaseLane(idx);
});

function pressLane(lane) {
  if (!gameRunning) return;
  keyBtnEls[lane].classList.add('pressed');
  const cfg = DIFFICULTIES[difficulty];
  const now = audioCtx.currentTime - gameStartTime;
  const H = laneHeight();
  const hitZoneBottom = 120 + 9;
  let best = null, bestDist = Infinity;
  notes.forEach(note => {
    if (note.hit || note.lane !== lane || !note.el) return;
    const elapsed = now - note.spawnTime;
    const noteBottom = H - elapsed * cfg.speed;
    const dist = Math.abs(noteBottom - hitZoneBottom);
    if (dist < bestDist) { bestDist = dist; best = note; }
  });
  const pixelWindow = cfg.speed * (cfg.hitWindow / 1000);
  const goodPixelWindow = cfg.speed * (cfg.goodWindow / 1000);
  if (best && bestDist <= goodPixelWindow) {
    best.hit = true;
    if (best.el && best.el.parentNode) {
      spawnHitEffect(lane, best.el.getBoundingClientRect().bottom - laneEls[lane].getBoundingClientRect().top);
      best.el.remove();
    }
    if (bestDist <= pixelWindow) {
      registerPerfect(lane);
    } else {
      registerGood(lane);
    }
  }
  keyBtnEls[lane].classList.add('flashing');
  setTimeout(() => keyBtnEls[lane].classList.remove('flashing'), 150);
}

function releaseLane(lane) {
  keyBtnEls[lane].classList.remove('pressed');
}

// ── SCORING ──
function registerPerfect(lane) {
  combo++; maxCombo = Math.max(maxCombo, combo);
  score += 300 + combo * 2;
  countPerfect++;
  showJudge(lane, 'PERFECT', 'judge-perfect');
  playPerfectSound();
  updateHUD('pop');
  checkComboMilestone();
}

function registerGood(lane) {
  combo++; maxCombo = Math.max(maxCombo, combo);
  score += 100 + combo;
  countGood++;
  showJudge(lane, 'GOOD', 'judge-good');
  playGoodSound();   // ← 낮은 음정 효과
  updateHUD();
  checkComboMilestone();
}

function registerMiss(lane) {
  combo = 0;
  countMiss++;
  showJudge(lane, 'MISS', 'judge-miss');
  playMissSound();   // ← 꽥! 소리
  shakeScreen();     // ← 화면 흔들림
  updateHUD();
}

function checkComboMilestone() {
  if (combo > 0 && combo % 10 === 0) {
    playAingSound();    // ← 아잉~ 소리
    launchFireworks();  // ← 폭죽
    showAingPopup();    // ← 팝업
  }
}

function showJudge(lane, text, cls) {
  const el = judgeEls[lane];
  el.textContent = text;
  el.className = 'judge-text ' + cls;
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 500);
}

function updateHUD(popScore) {
  const scoreEl = document.getElementById('score-val');
  const comboEl = document.getElementById('combo-val');
  const accEl = document.getElementById('acc-val');
  scoreEl.textContent = score.toLocaleString();
  comboEl.textContent = combo;
  const total = countPerfect + countGood + countMiss;
  const acc = total === 0 ? 100 : ((countPerfect + countGood * 0.5) / total * 100);
  accEl.textContent = acc.toFixed(1) + '%';
  if (popScore) {
    scoreEl.classList.remove('pop'); comboEl.classList.remove('pop');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('pop'); comboEl.classList.add('pop');
    setTimeout(() => { scoreEl.classList.remove('pop'); comboEl.classList.remove('pop'); }, 150);
  }
}

// ── HIT EFFECT ──
function spawnHitEffect(lane, y) {
  const el = document.createElement('div');
  el.className = 'hit-effect';
  el.style.setProperty('--lane-color', LANE_COLORS[lane]);
  el.style.bottom = (laneHeight() - y) + 'px';
  laneEls[lane].appendChild(el);
  for (let p = 0; p < 6; p++) {
    const pe = document.createElement('div');
    pe.className = 'particle';
    pe.style.background = LANE_COLORS[lane];
    pe.style.boxShadow = `0 0 8px ${LANE_COLORS[lane]}`;
    const angle = (p / 6) * Math.PI * 2;
    const dist = 40 + Math.random() * 30;
    pe.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    pe.style.setProperty('--ty', Math.sin(angle) * dist - 20 + 'px');
    pe.style.left = '50%';
    pe.style.bottom = (laneHeight() - y) + 'px';
    laneEls[lane].appendChild(pe);
    setTimeout(() => pe.remove(), 600);
  }
  setTimeout(() => el.remove(), 300);
}

// ── WAVEFORM ──
function drawWaveform() {
  if (!analyser || !waveCtx) return;
  analyser.getByteTimeDomainData(dataArray);
  const W = waveCanvas.width = waveCanvas.offsetWidth;
  const H = waveCanvas.height;
  waveCtx.clearRect(0,0,W,H);
  waveCtx.beginPath();
  waveCtx.strokeStyle = '#00f5ff';
  waveCtx.lineWidth = 1.5;
  const sliceW = W / dataArray.length;
  let x = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i] / 128.0;
    const y = v * H / 2;
    i === 0 ? waveCtx.moveTo(x, y) : waveCtx.lineTo(x, y);
    x += sliceW;
  }
  waveCtx.stroke();
}

// ── END GAME ──
function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animFrame);
  const total = countPerfect + countGood + countMiss;
  const acc = total === 0 ? 100 : ((countPerfect + countGood * 0.5) / total * 100);
  let grade, gradeClass;
  if (acc >= 95) { grade = 'S'; gradeClass = 'grade-S'; }
  else if (acc >= 85) { grade = 'A'; gradeClass = 'grade-A'; }
  else if (acc >= 70) { grade = 'B'; gradeClass = 'grade-B'; }
  else { grade = 'C'; gradeClass = 'grade-C'; }
  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-grade').className = 'result-grade ' + gradeClass;
  document.getElementById('r-score').textContent = score.toLocaleString();
  document.getElementById('r-maxcombo').textContent = maxCombo;
  document.getElementById('r-acc').textContent = acc.toFixed(1) + '%';
  document.getElementById('r-perfect').textContent = countPerfect;
  document.getElementById('r-good').textContent = countGood;
  document.getElementById('r-miss').textContent = countMiss;
  document.getElementById('result-title').textContent = acc >= 70 ? 'STAGE CLEAR' : 'GAME OVER';
  document.getElementById('result-screen').classList.add('active');
  setTimeout(() => {
    document.getElementById('acc-bar-fill').style.width = acc.toFixed(1) + '%';
  }, 100);
}

// ── RETRY / NEW SONG ──
document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('game-screen').classList.remove('active');
  if (audioFile) startGame();
});
document.getElementById('new-song-btn').addEventListener('click', () => {
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('start-btn').classList.remove('visible');
  document.getElementById('track-info').classList.remove('visible');
  audioBuffer = null; audioFile = null;
  fileInput.value = '';
});
</script>
